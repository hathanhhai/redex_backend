version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redex_backend_app
    restart: unless-stopped
    ports:
      - "6045:8000"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:GENERATE_ME
      DB_CONNECTION: mysql
      DB_HOST: ${DB_HOST:-your.mysql.server}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-redex}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    depends_on: []
    command: ["/bin/sh", "-c", "composer install --no-interaction --prefer-dist && php artisan key:generate --ansi --force && php artisan serve --host=0.0.0.0 --port=8000"]
